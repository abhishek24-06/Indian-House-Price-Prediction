<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
</head>
<body>

<h2>House Price Prediction</h2>

<form action="/predict" method="post">

    <label>Lot Area Renov:</label>
    <input type="number" name="lot_area_renov" required><br><br>

    <label>Living Area Renov:</label>
    <input type="number" name="living_area_renov" required><br><br>

    <label>House Age:</label>
    <input type="number" name="House_age" required><br><br>

    <label>Total Area:</label>
    <input type="number" name="Total Area" required><br><br>

    <label>Bathrooms:</label>
    <input type="number" step="0.1" name="number of bathrooms" required><br><br>

    <label>Grade:</label>
    <input type="number" name="grade of the house" required><br><br>

    <label>Condition:</label>
    <input type="number" name="condition of the house" required><br><br>

    <label>Views:</label>
    <input type="number" name="number of views" required><br><br>

    <label>Waterfront (0 or 1):</label>
    <input type="number" name="waterfront present" min="0" max="1" required><br><br>

    <label>Renovated (0 or 1):</label>
    <input type="number" name="Renovated" min="0" max="1" required><br><br>

    <h3>Location Clusters (One-hot)</h3>

    <label>Cluster 0:</label>
    <input type="number" name="Location_cluster_0" min="0" max="1" required><br><br>

    <label>Cluster 1:</label>
    <input type="number" name="Location_cluster_1" min="0" max="1" required><br><br>

    <label>Cluster 2:</label>
    <input type="number" name="Location_cluster_2" min="0" max="1" required><br><br>

    <label>Cluster 3:</label>
    <input type="number" name="Location_cluster_3" min="0" max="1" required><br><br>

    <label>Cluster 4:</label>
    <input type="number" name="Location_cluster_4" min="0" max="1" required><br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}
    <h3>Predicted Price: ₹ {{ prediction }}</h3>
{% endif %}

</body>
</html>
